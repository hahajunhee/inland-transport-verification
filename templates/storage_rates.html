{% extends "base.html" %}
{% block title %}보관료/상하차료 요율 - 내륙운송정산검증{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">보관료 및 상하차료 요율</h1>
  <p class="page-desc">ODCY명·단지구분별 보관료 및 상하차료 단가를 등록합니다.</p>
</div>

<!-- ───────────── 엑셀 업로드 ───────────── -->
<div class="card unified-upload-card">
  <div class="unified-upload-row">
    <span class="unified-upload-label">엑셀 양식 (전체 교체)</span>
    <button type="button" class="btn btn-outline btn-sm" onclick="downloadTemplate()">📥 현재 데이터 다운로드</button>
    <label class="btn btn-primary btn-sm file-label" style="margin:0">
      📤 업로드 (전체 교체)
      <input type="file" id="sr-upload-file" accept=".xlsx,.xls" style="display:none" onchange="uploadRates()" />
    </label>
    <span id="sr-upload-msg" class="upload-result" style="display:none"></span>
  </div>
</div>

<!-- ───────────── 요율 등록 폼 ───────────── -->
<div class="card">
  <h2 class="card-title">요율 등록</h2>

  <form id="sr-form" class="inline-form">
    <input type="hidden" id="sr-edit-id" value="" />
    <div class="form-row">
      <div class="form-group">
        <label>ODCY명 <span class="required">*</span></label>
        <input type="text" id="sr-odcy-name" placeholder="예: 세방(주), 한진" required />
      </div>
      <div class="form-group">
        <label>단지구분 <span class="required">*</span></label>
        <input type="text" id="sr-zone-type" placeholder="예: 배후단지, 일반" required />
      </div>
      <div class="form-group">
        <label>보관료 단가</label>
        <input type="number" id="sr-storage-unit" placeholder="0" min="0" step="1" />
      </div>
      <div class="form-group">
        <label>상하차료 단가</label>
        <input type="number" id="sr-handling-unit" placeholder="0" min="0" step="1" />
      </div>
      <div class="form-group">
        <label>비고</label>
        <input type="text" id="sr-memo" placeholder="메모" />
      </div>
      <div class="form-group form-group-btn">
        <label>&nbsp;</label>
        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="sr-submit-btn">추가</button>
          <button type="button" class="btn btn-outline" id="sr-cancel-btn" style="display:none" onclick="cancelSrEdit()">취소</button>
        </div>
      </div>
    </div>
  </form>
  <div id="sr-msg" class="form-msg" style="display:none"></div>
</div>

<!-- ───────────── 요율 목록 ───────────── -->
<div class="card">
  <h2 class="card-title">등록된 요율</h2>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th><input type="checkbox" id="sr-check-all" onchange="toggleAllSrCheck(this.checked)" /></th>
          <th>#</th>
          <th>ODCY명</th>
          <th>단지구분</th>
          <th class="money">보관료 단가</th>
          <th class="money">상하차료 단가</th>
          <th>비고</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="sr-tbody">
        <tr><td colspan="8" class="empty-msg">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="table-action-bar" id="sr-action-bar" style="display:none;margin-top:8px">
    <button type="button" class="btn btn-danger btn-sm" onclick="deleteSelectedSr()">
      🗑️ 선택 삭제 (<span id="sr-sel-count">0</span>건)
    </button>
  </div>
</div>

<style>
.unified-upload-card { background: #f8fafc; border: 1px solid #e2e8f0; }
.unified-upload-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.unified-upload-label { font-weight: 600; color: #374151; font-size: 14px; margin-right: 4px; }
.file-label { cursor: pointer; }
.upload-result { font-size: 13px; font-weight: 500; }
.upload-result.ok { color: #22c55e; }
.upload-result.err { color: #ef4444; }
.table-action-bar { display: flex; align-items: center; gap: 8px; }
</style>
{% endblock %}

{% block scripts %}
<script src="/static/js/storage_rates.js?v=2"></script>
{% endblock %}
